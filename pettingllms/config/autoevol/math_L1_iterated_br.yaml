defaults:
- ../ppo_trainer@models.model_0.ppo_trainer_config: eval
- ../ppo_trainer@models.model_1.ppo_trainer_config: eval
- _self_
workflow_type: autoevol
specialization: full
task_type: math
resource:
  nnodes: 1
  n_gpus_per_node: 8
  trust_remote_code: true
lora_rank: 0
lora_alpha: 16
env:
  name: math_env
  dataset: dapo_math
  benchmark: AIME24
  dataset_math: polaris
  dataset_code: code_contests
  benchmark_math: AIME24
  benchmark_code: code_contests
  math_ratio: 0.5
  apps_ratio: 0.0
  max_turns: 1
  resolve: false
  multi_modal: false
  batched_init: true
base_models:
  policy_0:
    path: Mercury7353/masrl_0228_mix_coldstart
    name: designer_policy
  policy_1:
    path: Mercury7353/masrl_0228_mix_coldstart
    name: executor_policy
agent_policy_configs:
  agent_configs:
    agent_0:
      name: Designer
      policy_name: designer_policy
      train_llm_config:
        enable_thinking: false
        temperature: 1.0
        top_p: 0.9
        top_k: 20
        min_p: 0.0
        repetition_penalty: 1.10
      val_llm_config:
        enable_thinking: false
        temperature: 0
        top_p: 1
        top_k: -1
        min_p: 0.0
    agent_1:
      name: Executor
      policy_name: executor_policy
      train_llm_config:
        enable_thinking: false
        temperature: 1.0
        top_p: 0.9
        top_k: 20
        min_p: 0.0
        repetition_penalty: 1.10
      val_llm_config:
        enable_thinking: false
        temperature: 0
        top_p: 1
        top_k: -1
        min_p: 0.0
multi_agent_interaction:
  turn_order:
  - Designer
  - Executor
  parallel: false
training:
  device: cuda
  total_training_steps: 400
  project_name: pettingllms
  experiment_name: autoeval_iterated_br
  logger:
  - console
  - wandb
  model_checkpoints_dir: checkpoints
  ray_wait_register_center_timeout: 300
  train_batch_size: 8
  train_sample_num: 8
  design_sample_num: 4
  execute_sample_num: 4
  executor_group_mode: question
  validate_sample_num: 1
  sample_temperature: 1
  val_freq: 100
  save_freq: 5
  train_data_mode: "all"
  # IBR (Iterated Best-Response) co-training
  # phase_alternate_steps > 0 enables hard-freeze alternation between two policies.
  # phase_alternate_steps=0 disables IBR (falls back to legacy lr_alternate_steps).
  phase_alternate_steps: 30
  # Which side trains in phase 0. "executor" = firstexe semantics.
  first_phase_trains: executor
  # Legacy soft alt-LR (kept for backward compat, must be 0 when phase_alternate_steps>0).
  lr_alternate_steps: 0
  designer_lr: 5e-6
  executor_lr: 5e-6
  max_prompt_length: 7000
  max_response_length: 8192
  lora_rank: ${lora_rank}
  lora_alpha: ${lora_alpha}
models:
  model_0:
    path: ${base_models.policy_0.path}
    name: ${base_models.policy_0.name}
    ppo_trainer_config:
      data:
        max_prompt_length: ${training.max_prompt_length}
        max_response_length: ${training.max_response_length}
      actor_rollout_ref:
        model:
          path: ${base_models.policy_0.path}
        rollout:
          temperature: ${training.sample_temperature}
          prompt_length: ${training.max_prompt_length}
          response_length: ${training.max_response_length}
          tensor_model_parallel_size: ${resource.n_gpus_per_node}
        trainer:
          n_gpus_per_node: ${resource.n_gpus_per_node}
          n_training_gpus_per_node: ${resource.n_gpus_per_node}
          experiment_name: ${training.experiment_name}
      actor:
        ppo_micro_batch_size: null
        ppo_micro_batch_size_per_gpu: 4
  model_1:
    path: ${base_models.policy_1.path}
    name: ${base_models.policy_1.name}
    ppo_trainer_config:
      data:
        max_prompt_length: ${training.max_prompt_length}
        max_response_length: ${training.max_response_length}
      actor_rollout_ref:
        model:
          path: ${base_models.policy_1.path}
        rollout:
          temperature: ${training.sample_temperature}
          prompt_length: ${training.max_prompt_length}
          response_length: ${training.max_response_length}
          tensor_model_parallel_size: ${resource.n_gpus_per_node}
        trainer:
          n_gpus_per_node: ${resource.n_gpus_per_node}
          n_training_gpus_per_node: ${resource.n_gpus_per_node}
          experiment_name: ${training.experiment_name}
      actor:
        ppo_micro_batch_size: null
        ppo_micro_batch_size_per_gpu: 4
